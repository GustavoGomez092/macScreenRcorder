name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build Release
        run: |
          xcodebuild -project "Screen Recorder.xcodeproj" \
            -scheme "Screen Recorder" \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create DMG
        run: |
          APP_PATH="build/Build/Products/Release/REC.app"
          mkdir -p dmg_staging
          cp -R "$APP_PATH" dmg_staging/
          ln -sf /Applications dmg_staging/Applications
          hdiutil create -volname "REC" -srcfolder dmg_staging -ov -format UDZO "REC-${GITHUB_REF_NAME}.dmg"
          rm -rf dmg_staging

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: REC-*.dmg
          generate_release_notes: true
